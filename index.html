<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahir Ali Library - Premium Motion</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <style>
        :root {
            --primary: #4F46E5; --primary-dark: #3730A3; --primary-light: #EEF2FF;
            --bg-color: #F8FAFC; --card-bg: #FFFFFF; --text-main: #0F172A;
            --text-muted: #64748B; --border: #E2E8F0; --success: #10B981;
            --danger: #EF4444; --warning: #F59E0B; --paused: #94A3B8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 90px; overflow-x: hidden; }
        
        header { background: var(--card-bg); color: var(--primary); padding: 1.2rem 1rem; text-align: center; font-size: 1.4rem; font-weight: 700; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .container { padding: 1.2rem; }
        
        /* Smooth Tab Transitions */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 0.8rem 0 1rem 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); z-index: 100; border-top-left-radius: 24px; border-top-right-radius: 24px; }
        nav button { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 20%; transition: all 0.3s ease; }
        nav button .material-symbols-rounded { font-size: 1.5rem; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        nav button.active { color: var(--primary); font-weight: 600; }
        nav button.active .material-symbols-rounded { transform: translateY(-4px) scale(1.1); font-variation-settings: 'FILL' 1; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid rgba(226,232,240,0.8); transition: transform 0.2s ease, box-shadow 0.2s ease; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .stat-card { background: var(--card-bg); border-radius: 20px; padding: 1.2rem; border: 1px solid var(--border); position: relative; overflow: hidden; animation: fadeSlideUp 0.5s ease backwards; }
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        .stat-card h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-card p { font-size: 1.6rem; font-weight: 800; margin-top: 4px; }

        input, select { width: 100%; padding: 0.9rem; background-color: #F1F5F9; border-radius: 14px; border: 2px solid transparent; font-size: 1rem; font-weight: 500; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: var(--primary); background-color: white; box-shadow: 0 0 0 4px var(--primary-light); transform: translateY(-2px); }
        
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2); }
        .btn-success { background: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); } 
        .btn-danger { background: var(--danger); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        /* Animated List Items */
        .list-item { background: var(--card-bg); border-radius: 20px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid var(--border); position: relative; border-left: 5px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.02); animation: fadeSlideUp 0.4s ease backwards; }
        .list-item.pending-item { border-left-color: var(--warning); }
        .list-item.paused-item { border-left-color: var(--paused); opacity: 0.8; }
        
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badge { background: var(--primary-light); color: var(--primary-dark); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        
        .action-row { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
        .action-btn { flex: 1; padding: 8px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; transition: all 0.2s ease; }
        .action-btn:active { transform: scale(0.92); }

        /* Animated Seat Grid */
        .seat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin-top: 15px; }
        .seat { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.8rem; font-weight: 700; color: white; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 2px 8px rgba(0,0,0,0.1); animation: fadeSlideUp 0.5s ease backwards; }
        .seat.available { background-color: var(--success); } 
        .seat.occupied { background-color: var(--danger); }
        .seat:active { transform: scale(0.85); }
        .seat-label { font-size: 0.45rem; width: 90%; text-align: center; overflow: hidden; white-space: nowrap; margin-top: 2px; }

        .status-toggle { display: flex; background: var(--border); border-radius: 14px; padding: 4px; margin-bottom: 1.2rem; }
        .status-toggle button { flex: 1; padding: 0.7rem; border: none; background: transparent; border-radius: 10px; font-weight: 600; color: var(--text-muted); font-size: 0.85rem; transition: all 0.3s ease; }
        .status-toggle button.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); transform: scale(1.02); }

        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--primary-light); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Bouncy Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px); animation: fadeIn 0.2s ease; }
        .modal-box { background: var(--card-bg); padding: 24px; border-radius: 24px; width: 90%; max-width: 400px; animation: popBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popBounce { 
            0% { transform: scale(0.8); opacity: 0; } 
            80% { transform: scale(1.05); opacity: 1; } 
            100% { transform: scale(1); opacity: 1; } 
        }
    </style>
</head>
<body>

    <header><span class="material-symbols-rounded">menu_book</span> Mahir Ali Library</header>
    <div id="loader-overlay"><div class="spinner"></div></div>

    <div id="feeModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="feeModalTitle" style="font-size: 1.2rem; font-weight: 700;">Update Fee Record</h3>
            <p id="feeModalDesc" style="font-size: 0.85rem; color: var(--text-muted); margin: 8px 0 16px;"></p>
            <input type="number" id="feeInputAmount" placeholder="Amount collected (₹)" style="margin-bottom: 12px;">
            <input type="date" id="feeInputDate" style="margin-bottom: 20px;">
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:var(--border); color:var(--text-main); box-shadow:none;" onclick="closeFeeModal()">Cancel</button>
                <button class="btn btn-success" id="feeConfirmBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="tab-dashboard" class="tab-content active">
            <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; box-shadow: 0 10px 25px rgba(79,70,229,0.3);">
                <h3 style="font-size: 0.85rem; opacity: 0.9;">Net Profit (Monthly)</h3>
                <input type="month" id="dashMonth" onchange="updateDashboard()" style="background:rgba(255,255,255,0.2); color:white; border:none; margin-top:10px;">
                <p id="net-balance" style="font-size: 2.4rem; font-weight: 700; margin-top: 10px; display: flex; align-items: center; gap: 5px;"><span class="material-symbols-rounded" style="font-size: 2.2rem;">account_balance_wallet</span> ₹0</p>
            </div>
            <div class="dashboard-grid">
                <div class="stat-card"><h3>Revenue</h3><p id="total-revenue" style="color:var(--success)">₹0</p></div>
                <div class="stat-card"><h3>Bills</h3><p id="total-expenses" style="color:var(--danger)">₹0</p></div>
                <div class="stat-card"><h3>Active</h3><p id="active-students">0</p></div>
                <div class="stat-card"><h3>Paused</h3><p id="paused-count" style="color:var(--paused)">0</p></div>
            </div>
        </section>

        <section id="tab-seats" class="tab-content">
            <div class="card" style="display: flex; justify-content: space-around; font-size: 0.85rem; padding: 1rem;">
                <span style="color:var(--success); font-weight:600; display:flex; align-items:center; gap:5px;"><span class="material-symbols-rounded">check_circle</span> Available</span>
                <span style="color:var(--danger); font-weight:600; display:flex; align-items:center; gap:5px;"><span class="material-symbols-rounded">cancel</span> Occupied</span>
            </div>
            <div class="seat-grid" id="seatMatrixContainer"></div>
        </section>

        <section id="tab-list" class="tab-content">
            <div class="status-toggle">
                <button id="btn-Paid" class="active" onclick="setView('Paid')">Paid</button>
                <button id="btn-Pending" onclick="setView('Pending')">Pending</button>
                <button id="btn-Paused" onclick="setView('Paused')">Paused</button>
            </div>
            <div style="position: relative; margin-bottom: 1.2rem;">
                <span class="material-symbols-rounded" style="position: absolute; left: 12px; top: 12px; color: var(--text-muted);">search</span>
                <input type="text" id="searchName" placeholder="Search name..." oninput="renderStudents()" style="padding-left: 45px;">
            </div>
            <div id="studentListContainer"></div>
        </section>

        <section id="tab-add" class="tab-content">
            <div class="card">
                <h2 style="font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;"><span class="material-symbols-rounded" style="color:var(--primary);">person_add</span> New Admission</h2>
                <form onsubmit="addStudent(event)">
                    <div style="margin-bottom:1rem;"><label>Name</label><input type="text" id="sName" required></div>
                    <div style="margin-bottom:1rem;"><label>Phone</label><input type="tel" id="sPhone" required></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem;">
                        <div><label>Seat (1-110)</label><input type="number" id="sSeat" min="1" max="110" required></div>
                        <div><label>Shift</label><select id="sShift"><option>Morning</option><option>Evening</option><option>Full Day</option></select></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem;">
                        <div><label>Fee Status</label><select id="sStatus"><option value="Paid">Paid</option><option value="Pending">Pending</option></select></div>
                        <div><label>Fees (₹)</label><input type="number" id="sFees" value="0"></div>
                    </div>
                    <div style="margin-bottom:1.5rem;"><label>Due Date</label><input type="date" id="sDueDate" required></div>
                    <button type="submit" class="btn"><span class="material-symbols-rounded">save</span> Save Admission</button>
                </form>
            </div>
        </section>

        <section id="tab-expenses" class="tab-content">
            <div class="card">
                <h2 style="font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;"><span class="material-symbols-rounded" style="color:var(--danger);">payments</span> Add Expense</h2>
                <form onsubmit="addExpense(event)">
                    <div style="margin-bottom:1rem;"><label>Bill Category</label><select id="eType"><option>WiFi</option><option>Water</option><option>Manager</option><option>Cleaning</option><option>Other</option></select></div>
                    <div style="margin-bottom:1rem;"><label>Amount (₹)</label><input type="number" id="eAmount" required></div>
                    <div style="margin-bottom:1.5rem;"><label>Date</label><input type="date" id="eDate" required></div>
                    <button type="submit" class="btn btn-danger"><span class="material-symbols-rounded">add_circle</span> Add Expense</button>
                </form>
            </div>
            <div id="expenseList"></div>
        </section>
    </div>

    <nav>
        <button class="active" onclick="switchTab('dashboard')" id="nav-dashboard"><span class="material-symbols-rounded">dashboard</span>Home</button>
        <button onclick="switchTab('seats')" id="nav-seats"><span class="material-symbols-rounded">grid_view</span>Seats</button>
        <button onclick="switchTab('list')" id="nav-list"><span class="material-symbols-rounded">groups</span>Students</button>
        <button onclick="switchTab('add')" id="nav-add"><span class="material-symbols-rounded">person_add</span>Add</button>
        <button onclick="switchTab('expenses')" id="nav-expenses"><span class="material-symbols-rounded">receipt_long</span>Bills</button>
    </nav>

    <script>
        // FIREBASE CONFIG (YOUR KEYS)
        const firebaseConfig = {
            apiKey: "AIzaSyALrWPuk2toBA5faEImfzWPCoV-NcM53E0",
            authDomain: "mahir-library.firebaseapp.com",
            projectId: "mahir-library",
            storageBucket: "mahir-library.firebasestorage.app",
            messagingSenderId: "416819608395",
            appId: "1:416819608395:web:66a5ae1170fb0d5e6846ce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let students = [], expenses = [], currentView = 'Paid', activeModalId = null;

        async function load() {
            document.getElementById('loader-overlay').style.display = 'flex';
            const sSnap = await db.collection("students").get();
            students = sSnap.docs.map(d => ({id: d.id, ...d.data()}));
            const eSnap = await db.collection("expenses").get();
            expenses = eSnap.docs.map(d => ({id: d.id, ...d.data()}));
            updateDashboard(); renderSeats(); renderStudents(); renderExpenses();
            document.getElementById('loader-overlay').style.display = 'none';
        }

        function updateDashboard() {
            const month = document.getElementById('dashMonth').value;
            const fStu = students.filter(s => !month || (s.dateAdded && s.dateAdded.startsWith(month)));
            const fExp = expenses.filter(e => !month || (e.date && e.date.startsWith(month)));
            
            const rev = fStu.reduce((a, b) => a + Number(b.fees || 0), 0);
            const exp = fExp.reduce((a, b) => a + Number(b.amount || 0), 0);
            
            document.getElementById('total-revenue').innerText = '₹' + rev.toLocaleString('en-IN');
            document.getElementById('total-expenses').innerText = '₹' + exp.toLocaleString('en-IN');
            document.getElementById('net-balance').innerHTML = `<span class="material-symbols-rounded" style="font-size: 2.2rem; vertical-align: middle;">account_balance_wallet</span> ₹` + (rev - exp).toLocaleString('en-IN');
            document.getElementById('active-students').innerText = students.filter(s => s.activeStatus !== 'Paused').length;
            document.getElementById('paused-count').innerText = students.filter(s => s.activeStatus === 'Paused').length;
        }

        function renderSeats() {
            const container = document.getElementById('seatMatrixContainer');
            container.innerHTML = '';
            for(let i=1; i<=110; i++) {
                const s = students.find(x => Number(x.seat) === i && x.activeStatus !== 'Paused');
                container.innerHTML += `<div class="seat ${s?'occupied':'available'}" style="animation-delay:${i * 0.005}s"><span>${i}</span><div class="seat-label">${s?s.name:''}</div></div>`;
            }
        }

        function renderStudents() {
            const container = document.getElementById('studentListContainer');
            const search = document.getElementById('searchName').value.toLowerCase();
            const filtered = students.filter(s => {
                const matchesSearch = s.name.toLowerCase().includes(search);
                if(currentView === 'Paused') return s.activeStatus === 'Paused' && matchesSearch;
                return s.feeStatus === currentView && s.activeStatus !== 'Paused' && matchesSearch;
            });

            // Sort by Date
            filtered.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));

            container.innerHTML = filtered.length ? '' : '<p style="text-align:center; padding:20px; color:gray; margin-top:20px;"><span class="material-symbols-rounded" style="font-size:3rem; opacity:0.5;">folder_open</span><br>No records found.</p>';
            
            filtered.forEach((s, index) => {
                const isOverdue = new Date(s.dueDate).setHours(0,0,0,0) < new Date().setHours(0,0,0,0);
                
                // HIGHLIGHTED AMOUNT PAID SECTION HERE
                container.innerHTML += `
                <div class="list-item ${currentView==='Pending'?'pending-item':''} ${currentView==='Paused'?'paused-item':''}" style="animation-delay:${index * 0.05}s">
                    <div class="item-header"><b style="font-size:1.1rem; color:var(--text-main);">${s.name}</b> <span class="badge">Seat ${s.seat}</span></div>
                    
                    <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom: 4px; display:flex; justify-content:space-between; align-items:center;">
                        <span><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle;">schedule</span> ${s.shift}</span>
                        <span style="font-weight:600; color:var(--success);"><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle;">payments</span> Paid: ₹${s.fees || 0}</span>
                    </div>

                    <div style="font-size:0.85rem; color:var(--text-muted);">
                        Due Date: <span style="font-weight:600; color:${isOverdue?'var(--danger)':'var(--text-main)'}">${new Date(s.dueDate).toLocaleDateString('en-IN')} ${isOverdue?'(Overdue)':''}</span>
                    </div>

                    <div class="action-row">
                        ${s.activeStatus === 'Paused' ? 
                            `<button class="action-btn" style="background:var(--primary-light); color:var(--primary);" onclick="togglePause('${s.id}', 'Active')"><span class="material-symbols-rounded">play_arrow</span> Resume</button>` :
                            `<button class="action-btn" style="background:#F1F5F9; color:var(--text-muted);" onclick="togglePause('${s.id}', 'Paused')"><span class="material-symbols-rounded">pause</span> Pause</button>`
                        }
                        ${s.feeStatus === 'Pending' && s.activeStatus !== 'Paused' ? 
                            `<button class="action-btn btn-success" onclick="openFeeModal('${s.id}', '${s.name}')"><span class="material-symbols-rounded">payments</span> Collect Fee</button>` : 
                            `<button class="action-btn" style="background:var(--success-light); color:var(--success);" onclick="openFeeModal('${s.id}', '${s.name}')"><span class="material-symbols-rounded">autorenew</span> Renew</button>`
                        }
                        <button class="action-btn" style="color:var(--danger); flex: 0.5;" onclick="del('students', '${s.id}')"><span class="material-symbols-rounded">delete</span></button>
                    </div>
                </div>`;
            });
        }

        async function togglePause(id, status) {
            document.getElementById('loader-overlay').style.display = 'flex';
            await db.collection("students").doc(id).update({ activeStatus: status });
            load();
        }

        function openFeeModal(id, name) {
            activeModalId = id;
            document.getElementById('feeModalDesc').innerText = `Update records for ${name}`;
            document.getElementById('feeInputAmount').value = '';
            document.getElementById('feeInputDate').value = '';
            document.getElementById('feeModal').style.display = 'flex';
        }
        function closeFeeModal() { document.getElementById('feeModal').style.display = 'none'; }

        document.getElementById('feeConfirmBtn').onclick = async () => {
            const amt = document.getElementById('feeInputAmount').value;
            const date = document.getElementById('feeInputDate').value;
            if(!date || !amt) return alert("Please fill all details");
            closeFeeModal();
            document.getElementById('loader-overlay').style.display = 'flex';
            await db.collection("students").doc(activeModalId).update({
                feeStatus: 'Paid',
                fees: firebase.firestore.FieldValue.increment(Number(amt)),
                dueDate: date
            });
            load();
        };

        async function addStudent(e) {
            e.preventDefault();
            const seat = document.getElementById('sSeat').value;
            if(students.some(x => Number(x.seat) === Number(seat) && x.activeStatus !== 'Paused')) return alert("Seat already occupied!");
            document.getElementById('loader-overlay').style.display = 'flex';
            await db.collection("students").add({
                name: document.getElementById('sName').value,
                phone: document.getElementById('sPhone').value,
                seat: seat,
                shift: document.getElementById('sShift').value,
                feeStatus: document.getElementById('sStatus').value,
                fees: Number(document.getElementById('sFees').value),
                dueDate: document.getElementById('sDueDate').value,
                activeStatus: 'Active',
                dateAdded: new Date().toISOString().split('T')[0]
            });
            document.getElementById('addStudentForm').reset();
            load(); switchTab('list');
        }

        async function addExpense(e) {
            e.preventDefault();
            document.getElementById('loader-overlay').style.display = 'flex';
            await db.collection("expenses").add({
                type: document.getElementById('eType').value,
                amount: Number(document.getElementById('eAmount').value),
                date: document.getElementById('eDate').value
            });
            load();
        }

        function renderExpenses() {
            const container = document.getElementById('expenseList');
            container.innerHTML = expenses.map((e, index) => `
                <div class="list-item" style="border-left-color:var(--danger); animation-delay:${index * 0.05}s">
                    <div class="item-header"><b style="font-size:1.05rem;">${e.type}</b> <b style="color:var(--danger); font-size:1.1rem;">₹${e.amount}</b></div>
                    <div style="font-size:0.85rem; color:var(--text-muted); display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <span><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle;">calendar_month</span> ${new Date(e.date).toLocaleDateString('en-IN')}</span> 
                        <button style="background:none; border:none; color:var(--danger); cursor:pointer; display:flex; align-items:center;" onclick="del('expenses','${e.id}')"><span class="material-symbols-rounded" style="font-size:20px;">delete</span></button>
                    </div>
                </div>
            `).join('');
        }

        async function del(col, id) { 
            if(confirm("Are you sure you want to delete this record?")) { 
                document.getElementById('loader-overlay').style.display = 'flex';
                await db.collection(col).doc(id).delete(); 
                load(); 
            } 
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id === 'seats') renderSeats();
        }

        function setView(v) {
            currentView = v;
            document.querySelectorAll('.status-toggle button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+v).classList.add('active');
            renderStudents();
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dashMonth').value = today.substring(0, 7);
            document.getElementById('eDate').value = today;
            document.getElementById('sDueDate').value = today;
            load();
        };
    </script>
</body>
</html>
